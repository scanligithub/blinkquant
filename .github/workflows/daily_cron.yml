name: Daily Cluster Cold Start (03:00 CST)

on:
  schedule:
    # 北京时间凌晨 03:00 对应 UTC 时间 19:00
    - cron: '0 19 * * *'
  workflow_dispatch: # 保留手动触发按钮

jobs:
  restart-nodes:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [1, 2, 3]
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # ---- 阶段 0：分时错峰启动，防止并发限制与 LFS 带宽冲突 ----
      - name: Staggered Delay (Avoid Concurrent HF Build Limits)
        run: |
          DELAY=$(( (${{ matrix.node }} - 1) * 120 ))
          if [ $DELAY -gt 0 ]; then
            echo "=========================================================="
            echo "Staggering deployment: Node ${{ matrix.node }} will sleep for $DELAY seconds..."
            echo "=========================================================="
            sleep $DELAY
          fi

      # ---- 核心步骤：推送到云端并进行两阶段健壮性监控 ----
      - name: Force Push and Monitor Deploy Node ${{ matrix.node }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd backend
          git init
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
          # ---- 核心修改：生成唯一的 BUILD_ID，写入文件并提交，用来唯一标识本次启动的容器 ----
          BUILD_ID=$(date +%s%N)
          echo "$BUILD_ID" > build_id.txt
          
          git add .
          git commit -m "Daily Auto-Restart: $(date)"
          
          # 记录本地最新的 commit SHA 
          LOCAL_SHA=$(git rev-parse HEAD)
          echo "Local Commit SHA to deploy: $LOCAL_SHA"
          
          # 1. 触发强推部署
          git push -f https://scanli:$HF_TOKEN@huggingface.co/spaces/scanli/blinkquant-node${{ matrix.node }} master:main
          
          # 2. 等待 15 秒，让 Hugging Face 接收并登记本次推送，开始构建任务
          echo "Waiting 15 seconds for Hugging Face to register the push..."
          sleep 15
          
          # ==========================================================
          # 阶段一：监控 Hugging Face 平台级的构建进度 (15 分钟保底上限)
          # ==========================================================
          DEPLOY_SUCCESS=false
          BUILD_ATTEMPTS=1
          MAX_BUILD_POLLS=30 # 最多等待 15 分钟 (30 * 30秒)
          
          while [ $BUILD_ATTEMPTS -le $MAX_BUILD_POLLS ]; do
            echo "Checking Hugging Face Space Status ($BUILD_ATTEMPTS/$MAX_BUILD_POLLS)..."
            
            # 访问 HF 官方 API 获取空间元数据
            SPACE_INFO=$(curl -s "https://huggingface.co/api/spaces/scanli/blinkquant-node${{ matrix.node }}")
            
            # 使用 jq 解析空间当前的 Stage 和 部署的 Git SHA
            CURRENT_STAGE=$(echo "$SPACE_INFO" | jq -r '.runtime.stage' 2>/dev/null || echo "")
            CURRENT_SHA=$(echo "$SPACE_INFO" | jq -r '.sha' 2>/dev/null || echo "")
            
            echo "Space Stage: '$CURRENT_STAGE', Active SHA on Cloud: '${CURRENT_SHA:0:7}'"
            
            # 如果检测到编译报错或崩溃，直接宣告失败，省去等待时间
            if [ "$CURRENT_STAGE" = "BUILD_ERROR" ] || [ "$CURRENT_STAGE" = "CRASHED" ]; then
              echo "❌ Error: HF Space reported build error or crash!"
              exit 1
            fi
            
            # 允许 RUNNING 或 RUNNING_APP_STARTING 状态放行，节约 3 分钟等待
            if [[ "$CURRENT_STAGE" == "RUNNING" || "$CURRENT_STAGE" == "RUNNING_APP_STARTING" ]] && [ "$CURRENT_SHA" = "$LOCAL_SHA" ]; then
              echo "🎉 New container is active on Hugging Face (Stage: $CURRENT_STAGE)!"
              DEPLOY_SUCCESS=true
              break
            fi
            
            sleep 30
            BUILD_ATTEMPTS=$((BUILD_ATTEMPTS+1))
          done
          
          if [ "$DEPLOY_SUCCESS" = false ]; then
            echo "❌ Error: Timeout waiting for HF Space to finish building."
            exit 1
          fi
          
          # ==========================================================
          # 阶段二：新版本就绪后，等待其内部 Polars 数据加载完毕 (4 分钟上限)
          # 并严格比对 BUILD_ID，防止因为滚动更新请求被路由到旧容器
          # ==========================================================
          HEALTHY=false
          POLL_COUNT=1
          MAX_POLLS=8 # 最多等待 4 分钟 (8 * 30秒)
          
          while [ $POLL_COUNT -le $MAX_POLLS ]; do
            echo "Polling app internal health check ($POLL_COUNT/$MAX_POLLS)..."
            
            RESPONSE=$(curl -s -m 10 "https://scanli-blinkquant-node${{ matrix.node }}.hf.space/api/v1/health" || echo "")
            STATUS=$(echo "$RESPONSE" | jq -r '.status' 2>/dev/null || echo "")
            RUNNING_BUILD_ID=$(echo "$RESPONSE" | jq -r '.build_id' 2>/dev/null || echo "")
            
            echo "App Status: '$STATUS', Running Build ID: '$RUNNING_BUILD_ID', Expected Build ID: '$BUILD_ID'"
            
            # 必须满足：状态为 healthy 且运行的 Build ID 匹配我们刚刚生成的 BUILD_ID 
            if [ "$STATUS" = "healthy" ] && [ "$RUNNING_BUILD_ID" = "$BUILD_ID" ]; then
              echo "✅ Success! Node ${{ matrix.node }} is healthy, updated, and ready!"
              HEALTHY=true
              break
            fi
            
            # 辅助日志诊断
            if [ "$RUNNING_BUILD_ID" != "$BUILD_ID" ] && [ -n "$RUNNING_BUILD_ID" ]; then
              echo "⏳ Still hitting the OLD container (Build ID mismatched). Waiting for HF router swap..."
            elif [ "$STATUS" = "initializing" ]; then
              echo "⏳ New container is initializing (loading data)..."
            else
              echo "💤 New container is booting up..."
            fi
            
            sleep 30
            POLL_COUNT=$((POLL_COUNT+1))
          done
          
          if [ "$HEALTHY" = false ]; then
            echo "❌ Error: New container failed to become healthy, or router did not swap in time."
            exit 1
          fi
